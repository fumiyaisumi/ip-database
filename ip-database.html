<style>
  :root {
    --primary: #3A5280;
    --primary-light: #5A729A;
    --primary-bg: #EEF1F8;
    --accent: #C04A3A;
    --accent-bg: #FBF0EE;
    --green: #2E8A6E;
    --green-bg: #E8F5F0;
    --yellow: #A07820;
    --yellow-bg: #F8F2E0;
    --blue: #3A72A8;
    --blue-bg: #EAF1F8;
    --pink: #7A5878;
    --pink-bg: #F5EEF5;
    --bg: #F2F4F8;
    --bg2: #FFFFFF;
    --card: #FFFFFF;
    --border: #D8DDE8;
    --border2: rgba(58,82,128,0.14);
    --text: #1A2440;
    --text2: #526080;
    --text3: #8A98AE;
    --shadow: 0 4px 24px rgba(26,36,64,0.07);
    --shadow-hover: 0 12px 40px rgba(26,36,64,0.13);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; min-height: 100vh; }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.94); backdrop-filter: blur(20px);
    border-bottom: 2px solid var(--border);
    padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 68px;
  }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-icon {
    width: 38px; height: 38px; border-radius: 12px;
    background: var(--primary);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 900; color: white; letter-spacing: -0.5px;
    box-shadow: 0 4px 12px rgba(26,36,64,0.18);
  }
  .logo-text { font-size: 20px; font-weight: 900; color: var(--text); letter-spacing: -0.5px; }
  .logo-text span { color: var(--primary); }
  .nav-links { display: flex; gap: 4px; }
  .nav-link { color: var(--text2); text-decoration: none; padding: 8px 18px; border-radius: 100px; font-size: 14px; font-weight: 700; transition: all 0.2s; }
  .nav-link:hover, .nav-link.active { color: var(--primary); background: var(--primary-bg); }

  /* HERO */
  .hero {
    padding: 80px 40px 64px; text-align: center;
    background: linear-gradient(180deg, #EEF1F8 0%, #F5F7FA 60%, #F2F4F8 100%);
    position: relative; overflow: hidden;
  }
  .hero-deco { position: absolute; border-radius: 50%; pointer-events: none; }
  .hero-deco-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(90,114,154,0.12) 0%, transparent 70%); top: -140px; left: -100px; }
  .hero-deco-2 { width: 360px; height: 360px; background: radial-gradient(circle, rgba(90,114,154,0.08) 0%, transparent 70%); top: -60px; right: -60px; }
  .hero-deco-3 { width: 280px; height: 280px; background: radial-gradient(circle, rgba(90,114,154,0.06) 0%, transparent 70%); bottom: -60px; left: 38%; }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: white; border: 2px solid var(--border2); color: var(--primary);
    padding: 7px 18px; border-radius: 100px; font-size: 12px; font-weight: 700; letter-spacing: 0.3px;
    margin-bottom: 28px; box-shadow: 0 2px 14px rgba(26,36,64,0.10);
  }
  .hero h1 { font-size: 56px; font-weight: 900; line-height: 1.18; margin-bottom: 22px; letter-spacing: -2px; color: var(--text); }
  .hero h1 .grad { color: var(--primary); }
  .hero p { font-size: 17px; color: var(--text2); max-width: 560px; margin: 0 auto 48px; line-height: 1.85; font-weight: 500; }
  .hero-stats { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .stat-pill { background: white; border: 2px solid var(--border); padding: 14px 24px; border-radius: 18px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px; }
  .stat-icon { font-size: 26px; }
  .stat-num { font-size: 22px; font-weight: 900; color: var(--text); line-height: 1; }
  .stat-num span { color: var(--primary); }
  .stat-label { font-size: 11px; color: var(--text3); font-weight: 700; margin-top: 2px; letter-spacing: 0.3px; }

  /* SEARCH */
  .search-section { max-width: 1200px; margin: 0 auto; padding: 52px 40px 28px; }
  .search-wrap { background: white; border: 2px solid var(--border); border-radius: 18px; padding: 7px 7px 7px 22px; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow); margin-bottom: 18px; transition: border-color 0.2s, box-shadow 0.2s; }
  .search-wrap:focus-within { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(58,82,128,0.12); }
  .search-icon { font-size: 18px; color: var(--text3); flex-shrink: 0; }
  .search-input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 16px; font-family: inherit; font-weight: 500; }
  .search-input::placeholder { color: var(--text3); }
  .search-btn { background: var(--primary); color: white; border: none; padding: 13px 26px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: inherit; box-shadow: 0 4px 14px rgba(26,36,64,0.18); }
  .search-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(26,36,64,0.22); background: var(--primary-light); }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn { background: white; border: 2px solid var(--border); color: var(--text2); padding: 8px 18px; border-radius: 100px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: inherit; }
  .filter-btn:hover { border-color: var(--primary-light); color: var(--primary); background: var(--primary-bg); }
  .filter-btn.active { background: var(--primary); border-color: var(--primary); color: white; box-shadow: 0 4px 14px rgba(26,36,64,0.18); }

  /* DB HEADER */
  .db-header-wrap { max-width: 1200px; margin: 0 auto; padding: 0 40px; }
  .db-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .db-title { font-size: 14px; color: var(--text2); font-weight: 700; }
  .db-title strong { color: var(--text); font-size: 16px; }
  .sort-select { background: white; border: 2px solid var(--border); color: var(--text2); padding: 9px 14px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; outline: none; }
  .sort-select:focus { border-color: var(--primary); }

  
  /* ===== COMPACT CARD ===== */
  .ip-card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: box-shadow 0.2s, border-color 0.2s;
    box-shadow: var(--shadow);
  }
  .ip-card:hover { border-color: var(--primary-light); box-shadow: var(--shadow-hover); }

  .card-compact { padding: 14px 16px 12px; }

  /* 行1: アイコン + IP名 + ジャンル */
  .card-row1 { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .card-icon-sm {
    width: 40px; height: 40px; border-radius: 11px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .card-name { font-size: 15px; font-weight: 900; color: var(--text); line-height: 1.3; word-break: break-all; }
  .card-genre { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
  .card-genre span { font-size: 10px; background: var(--primary-bg); color: var(--primary); padding: 2px 7px; border-radius: 100px; font-weight: 700; }

  /* 行2: スコア + Tierバッジ */
  .card-row2 { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .card-score { font-size: 20px; font-weight: 900; color: var(--text); letter-spacing: -0.5px; font-variant-numeric: tabular-nums; }
  .rank-badge { font-size: 11px; font-weight: 900; padding: 3px 10px; border-radius: 7px; white-space: nowrap; }

  /* 行3: タグ */
  .card-row3 { display: flex; gap: 5px; flex-wrap: wrap; min-height: 0; }

  /* ===== CARD METRICS ===== */
  .card-metrics-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 6px 12px; padding: 10px 16px;
    border-top: 1.5px solid var(--border);
    background: var(--bg);
  }
  .card-metric-item {
    display: flex; align-items: baseline; justify-content: space-between; gap: 4px;
  }
  .card-metric-name { font-size: 11px; color: var(--text3); font-weight: 700; }
  .card-metric-val { font-size: 14px; font-weight: 900; line-height: 1; }
  .card-metric-denom { font-size: 10px; font-weight: 700; color: var(--text3); }
  .card-sns-badge {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 700; color: var(--text2);
    grid-column: 1 / -1; padding-top: 2px;
  }
  .card-sns-badge span { font-weight: 900; }
  .card-detail-row {
    display: flex; justify-content: flex-end;
    padding: 10px 16px;
    border-top: 1.5px solid var(--border);
  }

/* ===== IP GRID ===== */
  .ip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 10px; }


  /* ===== MENTION CHART ===== */
  .mention-chart-wrap { position: relative; height: 160px; margin-top: 8px; }
  .mention-chart-svg { width: 100%; height: 100%; }
  .mention-chart-empty { text-align: center; padding: 40px 0; font-size: 13px; color: var(--text3); font-weight: 700; }
  .mention-axis-label { font-size: 10px; fill: var(--text3, #8A98AE); font-family: sans-serif; }
  .mention-tooltip {
    position: absolute; pointer-events: none;
    background: var(--text, #1A2440); color: white;
    font-size: 11px; font-weight: 700; padding: 5px 10px;
    border-radius: 8px; white-space: nowrap; opacity: 0;
    transition: opacity 0.15s; transform: translateX(-50%);
  }

  /* ===== DETAIL PAGE ===== */
  .detail-overlay {
    display: none; position: fixed; inset: 0;
    background: var(--bg); z-index: 300; overflow-y: auto;
  }
  .detail-overlay.open { display: block; }
  .detail-nav {
    position: sticky; top: 0; z-index: 10;
    background: rgba(242,244,248,0.95); backdrop-filter: blur(12px);
    border-bottom: 1.5px solid var(--border);
    padding: 0 40px; height: 56px;
    display: flex; align-items: center; gap: 16px;
  }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    background: white; border: 1.5px solid var(--border);
    color: var(--text2); padding: 7px 14px; border-radius: 10px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: all 0.2s;
  }
  .back-btn:hover { border-color: var(--primary); color: var(--primary); }
  .detail-breadcrumb { font-size: 13px; color: var(--text3); font-weight: 700; }
  .detail-content { max-width: 720px; margin: 0 auto; padding: 40px 40px 80px; }

  .detail-hero { display: flex; align-items: center; gap: 20px; margin-bottom: 32px; }
  .detail-icon { width: 80px; height: 80px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; flex-shrink: 0; box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
  .detail-title { font-size: 28px; font-weight: 900; color: var(--text); margin-bottom: 8px; letter-spacing: -0.5px; }
  .detail-genre-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .detail-genre-tags span { font-size: 12px; background: var(--primary-bg); color: var(--primary); padding: 3px 10px; border-radius: 100px; font-weight: 700; }

  .detail-power-card { border-radius: 18px; padding: 22px 26px; margin-bottom: 28px; display: flex; align-items: center; justify-content: space-between; }
  .detail-power-label { font-size: 10px; font-weight: 900; letter-spacing: 1.5px; opacity: 0.6; text-transform: uppercase; margin-bottom: 8px; }
  .detail-rank-badge { font-size: 14px; font-weight: 900; padding: 5px 14px; border-radius: 9px; background: rgba(255,255,255,0.4); display: inline-block; margin-bottom: 6px; }
  .detail-power-big { font-size: 52px; font-weight: 900; letter-spacing: -2px; line-height: 1; }
  .detail-power-unit { font-size: 11px; font-weight: 700; opacity: 0.6; margin-top: 4px; text-align: right; }

  .detail-section { margin-bottom: 28px; }
  .detail-section-title { font-size: 14px; font-weight: 900; color: var(--text2); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1.5px solid var(--border); }
  .detail-desc { font-size: 14px; color: var(--text2); line-height: 1.9; font-weight: 500; background: white; border: 1.5px solid var(--border); border-radius: 12px; padding: 14px 16px; }

  .detail-metrics { display: flex; flex-direction: column; gap: 10px; }
  .detail-metric { }
  .detail-metric-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .detail-metric-name { font-size: 13px; color: var(--text2); font-weight: 700; }
  .detail-metric-val { font-size: 14px; font-weight: 900; }
  .detail-bar-bg { height: 7px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .detail-bar { height: 100%; border-radius: 99px; }

  .detail-heatmap { display: grid; grid-template-columns: auto repeat(5,1fr); gap: 5px; }
  .hm-label { display: flex; align-items: center; font-size: 11px; color: var(--text3); font-weight: 700; padding-right: 6px; }
  .hm-col-label { text-align: center; font-size: 11px; color: var(--text3); font-weight: 700; padding: 4px 2px; }
  .hm-cell { height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; }

  .detail-collab-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
  .detail-cat-item { background: white; border: 1.5px solid var(--border); border-radius: 12px; padding: 14px 10px; text-align: center; }
  .detail-cat-emoji { font-size: 20px; margin-bottom: 5px; }
  .detail-cat-name { font-size: 10px; color: var(--text3); font-weight: 700; margin-bottom: 5px; }
  .detail-cat-score { font-size: 18px; font-weight: 900; margin-bottom: 5px; }
  .detail-cat-bar { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .detail-cat-bar-fill { height: 100%; border-radius: 99px; }

  @media (max-width: 768px) {
    .detail-nav, .detail-content { padding-left: 16px; padding-right: 16px; }
    .detail-power-big { font-size: 36px; }
    .detail-collab-grid { grid-template-columns: repeat(2,1fr); }
    .detail-hero { gap: 14px; }
    .detail-icon { width: 60px; height: 60px; font-size: 30px; }
  }


  /* COLLAB SECTION */
  .section { max-width: 1200px; margin: 72px auto 0; padding: 0 40px; }
  .section-header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
  .section-badge { width: 44px; height: 44px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; background: white; border: 2px solid var(--border); box-shadow: var(--shadow); flex-shrink: 0; }
  .section-title { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; color: var(--text); }
  .section-sub { font-size: 13px; color: var(--text3); margin-top: 3px; font-weight: 700; }
  .collab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }
  .collab-card { background: white; border: 2px solid var(--border); border-radius: 22px; padding: 24px; transition: all 0.25s; box-shadow: var(--shadow); }
  .collab-card:hover { transform: translateY(-4px); border-color: var(--primary-light); box-shadow: var(--shadow-hover); }
  .collab-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .collab-logos { display: flex; }
  .collab-logo { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .collab-logo:last-child { margin-left: -10px; border: 2.5px solid white; }
  .collab-info { flex: 1; }
  .collab-title { font-size: 14px; font-weight: 900; color: var(--text); margin-bottom: 3px; line-height: 1.4; }
  .collab-meta { font-size: 11px; color: var(--text3); font-weight: 700; }
  .collab-result p { font-size: 13px; color: var(--text2); line-height: 1.75; margin-bottom: 14px; font-weight: 500; }
  .collab-kpis { display: flex; gap: 10px; }
  .kpi { flex: 1; background: var(--bg); border: 2px solid var(--border); border-radius: 12px; padding: 10px; text-align: center; }
  .kpi-val { font-size: 18px; font-weight: 900; color: var(--green); }
  .kpi-label { font-size: 10px; color: var(--text3); margin-top: 2px; font-weight: 700; }
  .collab-tags { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
  .collab-tag { font-size: 11px; padding: 4px 11px; border-radius: 100px; background: var(--green-bg); color: var(--green); border: 1.5px solid #A8F0D8; font-weight: 700; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,26,62,0.4); backdrop-filter: blur(10px); z-index: 200; padding: 20px; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border: 2px solid var(--border); border-radius: 28px; width: 100%; max-width: 680px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1); box-shadow: 0 32px 80px rgba(26,26,62,0.18); }
  @keyframes slideUp { from { opacity: 0; transform: translateY(40px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .modal-header { padding: 28px 28px 22px; border-bottom: 2px solid var(--border); display: flex; align-items: flex-start; gap: 18px; }
  .modal-icon { width: 72px; height: 72px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 36px; flex-shrink: 0; box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
  .modal-title { font-size: 26px; font-weight: 900; color: var(--text); margin-bottom: 7px; letter-spacing: -0.5px; }
  .modal-close-btn { margin-left: auto; background: var(--bg); border: 2px solid var(--border); color: var(--text2); width: 36px; height: 36px; border-radius: 50%; font-size: 14px; font-weight: 900; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .modal-close-btn:hover { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
  .modal-body { padding: 28px; }
  .modal-power-hero { border-radius: 20px; padding: 22px 26px; margin-bottom: 28px; display: flex; align-items: center; justify-content: space-between; }
  .modal-power-title { font-size: 10px; font-weight: 900; letter-spacing: 1.5px; opacity: 0.6; text-transform: uppercase; margin-bottom: 8px; }
  .modal-rank-badge { font-size: 14px; font-weight: 900; padding: 5px 14px; border-radius: 9px; background: rgba(255,255,255,0.55); display: inline-block; margin-bottom: 6px; }
  .modal-power-big { font-size: 54px; font-weight: 900; letter-spacing: -2px; line-height: 1; }
  .modal-power-unit { font-size: 12px; font-weight: 700; opacity: 0.6; margin-top: 4px; text-align: right; }
  .modal-section-title { font-size: 15px; font-weight: 900; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .modal-section-badge { font-size: 14px; background: var(--primary-bg); width: 30px; height: 30px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .modal-metrics { margin-bottom: 28px; }
  .modal-metric { margin-bottom: 12px; }
  .modal-metric-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .modal-metric-name { font-size: 13px; color: var(--text2); font-weight: 700; }
  .modal-metric-val { font-size: 14px; font-weight: 900; }
  .modal-bar-bg { height: 8px; background: #F0F0FA; border-radius: 99px; overflow: hidden; }
  .modal-bar { height: 100%; border-radius: 99px; }
  .target-heatmap { display: grid; grid-template-columns: auto repeat(5,1fr); gap: 5px; margin-bottom: 28px; }

let ipData = [];

async function loadFromSupabase() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/ips?select=*&order=ip_power.desc`, {
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
    });
    if (!res.ok) throw new Error('Supabase API error: ' + res.status);
    const rows = await res.json();
    ipData = rows.map((row, i) => {
      const v = IP_VISUAL[row.name] || {};
      return {
        id: row.id || i+1,
        name: row.name,
        power: row.ip_power || 0,
        collabCount: row.collab_count || 0,
        desc: row.description || '',
        icon: v.icon || '\u2728',
        color: v.color || 'linear-gradient(135deg,#7B4FFF,#A47FFF)',
        genre: v.genre || [row.category || '\u305D\u306E\u4ED6'],
        categories: v.categories || ['other'],
        snsYoutube: row.sns_youtube || 0,
        snsX: row.sns_x || 0,
        sns: (()=>{ const r=calcSnsScore(row.sns_x||0, row.sns_youtube||0); return r!==null?r:(v.sns||50); })(),
        search: v.search || 50, collab: v.collab || 50,
        goods: row.goods_market || v.goods || 50, brandSafe: v.brandSafe || 80,
        tags: v.tags || [], trending: v.trending || false,
        target: v.target || {"10\u4EE3":[50,50],"20\u4EE3":[50,50],"30\u4EE3":[50,50],"40\u4EE3":[50,50],"50\u4EE3+":[50,50]},
        collabCategories: v.collabCategories || [],
        accounts: v.accounts || {}
      };
    });
    document.querySelector('.stat-pill .stat-num').innerHTML = `<span>${rows.length}</span>`;
  } catch(e) {
    console.warn('Supabase load failed, using static data:', e);
  }
}

  if(n>=10000) return Math.round(n/10000)+'\u4E07';
  if(n>=1000) return (n/1000).toFixed(1).replace(/\.0$/,'')+'\u5343';
  return n.toString();
}

// SNS\u30B9\u30B3\u30A2\u8A08\u7B97 (\u5B9F\u30D5\u30A9\u30ED\u30EF\u30FC\u6570\u304B\u30890-100\u30B9\u30B3\u30A2\u3078)
function calcSnsScore(xFollowers, ytSubs){
  const xScore = xFollowers > 0 ? Math.min(100, Math.round(Math.log10(Math.max(xFollowers,1)) / Math.log10(6000000) * 100)) : 0;
  const ytScore = ytSubs > 0 ? Math.min(100, Math.round(Math.log10(Math.max(ytSubs,1)) / Math.log10(7000000) * 100)) : 0;
  if(xScore === 0 && ytScore === 0) return null; // \u30C7\u30FC\u30BF\u306A\u3057
  return Math.max(xScore, ytScore);
}

function renderCard(ip){
  const r=getRank(ip.power);
  const tagHot=ip.tags.includes('hot')?'<span class="tag hot">\uD83D\uDD25 HOT</span>':'';
  const tagTrend=ip.tags.includes('trending')?'<span class="tag trending">\uD83D\uDCC8 \u6025\u4E0A\u6607</span>':'';
  const tagSafe=ip.tags.includes('safe')?'<span class="tag safe">\u23F3 \u30ED\u30F3\u30B0\u30E9\u30F3</span>':'';
  const metrics=[
    ["SNS\u71B1\u91CF",ip.sns],["\u691C\u7D22\u30C8\u30EC\u30F3\u30C9",ip.search],["\u30B3\u30E9\u30DC\u5B9F\u7E3E",ip.collab],["\u30B0\u30C3\u30BA\u5E02\u5834",ip.goods]

function showDetailPage(ip){

  document.getElementById('detail-overlay').scrollTop=0;
  setTimeout(()=>loadMentionChart(ip.name,`mention-chart-${ip.id}`,`mention-tooltip-${ip.id}`),100);
  document.body.style.overflow='hidden';
}

function closeDetail(){
  document.getElementById('detail-overlay').classList.remove('open');
  document.body.style.overflow='';
  history.pushState(null,'',location.pathname);
}


// ===== MENTION CHART =====
async function loadMentionChart(ipName, containerId, tooltipId){
  const url=`${SUPABASE_URL}/rest/v1/ip_mentions?ip_name=eq.${encodeURIComponent(ipName)}&order=date.asc&limit=56`;
  const headers={'apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`};
  let rows=[];
  try{
    const res=await fetch(url,{headers});
    rows=await res.json();
  }catch(e){ return; }
  if(!Array.isArray(rows)||rows.length<2) return;

  // 週単位に集約
  const weekMap={};
  rows.forEach(r=>{
    const d=new Date(r.date);
    const mon=new Date(d);
    mon.setDate(d.getDate()-d.getDay()+1);
    const key=mon.toISOString().slice(0,10);
    weekMap[key]=(weekMap[key]||0)+r.count;
  });
  const weeks=Object.keys(weekMap).sort();
  const vals=weeks.map(w=>weekMap[w]);
  if(vals.length<1) return;

  const container=document.getElementById(containerId);
  if(!container) return;
  const maxVal=Math.max(...vals)||1;
  const W=container.clientWidth||600;
  const H=150;
  const pad={l:40,r:10,t:10,b:28};
  const pw=W-pad.l-pad.r;
  const ph=H-pad.t-pad.b;
  const bw=Math.max(6,Math.floor(pw/weeks.length)-4);

  const bars=vals.map((v,i)=>{
    const bh=Math.max(2,Math.round(v/maxVal*ph));
    const x=pad.l+Math.round(i*(pw/weeks.length)+(pw/weeks.length-bw)/2);
    const y=pad.t+ph-bh;
    const label=weeks[i].slice(5);// MM-DD
    return `<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="3" fill="var(--primary,#3A5280)" opacity="0.8"
      data-val="${v.toLocaleString('ja-JP')}" data-date="${label}"
      onmouseenter="showMentionTip('${tooltipId}',this,event)"
      onmouseleave="hideMentionTip('${tooltipId}')"/>`;
  }).join('');

  const axisLabels=[];
  const step=Math.max(1,Math.ceil(weeks.length/5));
  for(let i=0;i<weeks.length;i+=step){
    const x=pad.l+Math.round(i*(pw/weeks.length)+bw/2);
    axisLabels.push(`<text class="mention-axis-label" x="${x}" y="${H-6}" text-anchor="middle">${weeks[i].slice(5)}</text>`);
  }
  const yLabels=[0,Math.round(maxVal/2),maxVal].map(v=>{
    const y=pad.t+ph-Math.round(v/maxVal*ph);
    const txt=v>=10000?`${Math.round(v/10000)}\u4E07`:v.toLocaleString('ja-JP');
    return `<text class="mention-axis-label" x="${pad.l-4}" y="${y+4}" text-anchor="end">${txt}</text>`;
  }).join('');

  container.innerHTML=`<svg class="mention-chart-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <line x1="${pad.l}" y1="${pad.t}" x2="${pad.l}" y2="${pad.t+ph}" stroke="#D8DDE8" stroke-width="1"/>
    <line x1="${pad.l}" y1="${pad.t+ph}" x2="${pad.l+pw}" y2="${pad.t+ph}" stroke="#D8DDE8" stroke-width="1"/>
    ${bars}${axisLabels.join('')}${yLabels}
  </svg>`;
}

function showMentionTip(id,rect,e){
  const tip=document.getElementById(id);
  if(!tip) return;
  tip.textContent=`${rect.dataset.date}: ${rect.dataset.val}\u4EF6`;
  const box=rect.closest('.detail-section').getBoundingClientRect();
  const rx=rect.getBoundingClientRect();
  tip.style.left=(rx.left-box.left+rx.width/2)+'px';
  tip.style.top=(rx.top-box.top-32)+'px';
  tip.style.opacity='1';
}
function hideMentionTip(id){
  const tip=document.getElementById(id);
  if(tip) tip.style.opacity='0';
}

function handleHash(){
  const m=location.hash.match(/^#\/ip\/(\d+)$/);
  if(m){
    const ip=ipData.find(i=>i.id===parseInt(m[1]));
    if(ip) showDetailPage(ip);
  } else {
    document.getElementById('detail-overlay').classList.remove('open');
    document.body.style.overflow='';
  }
}

window.addEventListener('hashchange',handleHash);
window.addEventListener('load',()=>{
  handleHash();
  renderAll();
});
